<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alpstay · Sala colazioni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Belleza&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#FFFFFF;
    --ink:#16140F;
    --ink-soft:#4A463D;
    --gold:#B08A45;
    --gold-soft:#C9A86A;
    --sand:#F5F0E6;
    --line:rgba(22,20,15,.12);
    --line-gold:rgba(176,138,69,.35);
    --shadow:0 18px 50px -28px rgba(22,20,15,.45);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--white);
    color:var(--ink);
    font-family:'Belleza',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    touch-action:manipulation;
  }
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}

  /* ---------- shell ---------- */
  .app{min-height:100dvh;display:flex;flex-direction:column;}
  .view{flex:1;display:none;flex-direction:column;}
  .view.is-active{display:flex;}
  #kiosk.is-active{height:100dvh;overflow:hidden;}

  /* ---------- brand header ---------- */
  .brand{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:clamp(10px,2.2vh,30px) 20px clamp(2px,0.6vh,6px);
  }
  .logo{height:clamp(46px,7vh,96px);width:auto;display:block;}
  .confirm .logo-confirm{height:clamp(96px,17vw,150px);}

  /* ---------- greeting ---------- */
  .greet-wrap{
    text-align:center;
    padding:clamp(4px,1.4vh,20px) 20px clamp(2px,0.8vh,12px);
    min-height:auto;
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:clamp(2px,0.6vh,8px);
  }
  .greet{
    font-size:clamp(36px,6vh,88px);
    line-height:.96;
    color:var(--ink);
    transition:opacity .6s ease, transform .6s ease;
  }
  .greet-lang{
    font-size:clamp(12px,1.5vw,15px);
    letter-spacing:.4em;text-indent:.4em;
    text-transform:lowercase;
    color:var(--gold);
    transition:opacity .6s ease;
  }
  .fade-out{opacity:0;transform:translateY(8px);}
  .sub{
    text-align:center;
    font-size:clamp(15px,2vw,19px);
    letter-spacing:.34em;text-indent:.34em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding-bottom:clamp(8px,1.6vw,16px);
  }

  /* ---------- kiosk body ---------- */
  .kiosk-body{
    flex:1;
    display:grid;
    grid-template-columns:1fr;
    gap:clamp(14px,2.6vw,32px);
    align-content:center;justify-items:center;
    width:100%;max-width:960px;margin:0 auto;
    padding:clamp(4px,1vh,14px) clamp(20px,4vw,40px) clamp(10px,2vh,26px);
  }
  @media(min-width:900px) and (orientation:landscape){
    .kiosk-body{grid-template-columns:minmax(280px,1fr) minmax(280px,1.05fr);align-items:start;}
  }

  .panel{width:100%;max-width:min(92vw,520px);}
  .panel-label{
    text-align:center;
    font-size:clamp(13px,1.6vw,16px);
    letter-spacing:.3em;text-indent:.3em;text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:clamp(10px,1.6vw,16px);
  }
  .panel-label.room{
    font-size:clamp(24px,4vw,40px);
    letter-spacing:.18em;text-indent:.18em;
    color:var(--ink);
    margin-bottom:clamp(12px,2vw,20px);
    padding-bottom:clamp(8px,1.4vw,12px);
    position:relative;
  }
  .panel-label.room::after{
    content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:clamp(48px,8vw,72px);height:3px;background:var(--gold);border-radius:2px;
  }
  .panel-label.sym{
    display:flex;align-items:center;justify-content:center;gap:clamp(8px,1.6vw,18px);
    margin-bottom:clamp(12px,2vw,20px);
    padding-bottom:clamp(8px,1.4vw,12px);
    position:relative;
  }
  .panel-label.sym .grp{height:clamp(36px,5.6vw,54px);width:auto;display:block;}
  .panel-label.sym .qmark{font-size:clamp(34px,5.4vw,56px);color:var(--gold);line-height:1;}
  .panel-label.sym::after{
    content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:clamp(48px,8vw,72px);height:3px;background:var(--gold);border-radius:2px;
  }

  /* display */
  .display{
    height:clamp(54px,6.8vh,88px);
    border:1.5px solid var(--ink);
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(30px,5vh,58px);
    letter-spacing:.18em;text-indent:.18em;
    color:var(--ink);
    background:var(--white);
    margin-bottom:clamp(10px,1.4vh,18px);
    position:relative;
    transition:border-color .2s ease;
  }
  .display .placeholder{color:rgba(22,20,15,.26);letter-spacing:.12em;font-size:clamp(18px,2.6vw,26px);text-indent:0;}
  .display.error{border-color:var(--gold);animation:shake .4s;}
  .display.error::after{
    content:"Inserisci il numero di stanza";
    position:absolute;bottom:-26px;left:0;right:0;text-align:center;
    font-size:13px;letter-spacing:.04em;color:var(--gold);
  }
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

  /* keypad */
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,1.3vh,14px);}
  .key{
    height:clamp(44px,6.6vh,74px);
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--white);
    font-size:clamp(22px,4vh,34px);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    transition:transform .08s ease, background .15s ease, border-color .15s ease, color .15s ease;
  }
  .key:hover{border-color:var(--line-gold);}
  .key:active{transform:scale(.95);background:var(--ink);color:var(--white);border-color:var(--ink);}
  .key.util{font-size:clamp(20px,3.2vw,26px);color:var(--gold);}
  .key.util:active{background:var(--gold);color:var(--white);border-color:var(--gold);}

  /* people */
  .people{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(8px,1.4vw,14px);}
  @media(max-width:460px){.people{grid-template-columns:repeat(2,1fr);}}
  .person{
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--white);
    padding:clamp(8px,1.4vh,18px) 4px clamp(8px,1.1vh,14px);
    display:flex;flex-direction:column;align-items:center;gap:clamp(4px,0.9vh,8px);
    min-width:0;overflow:hidden;
    transition:transform .1s ease, border-color .2s ease, background .2s ease;
  }
  .person:hover{border-color:var(--line-gold);}
  .person:active,.person.flash{transform:translateY(2px);border-color:var(--gold);background:var(--sand);}
  .person.selected{border-color:var(--gold);background:var(--sand);box-shadow:inset 0 0 0 1px var(--gold);}
  .people.hint{animation:shake .4s;}

  /* tasto invio */
  .send-row{grid-column:1/-1;display:flex;justify-content:center;margin-top:clamp(6px,1.4vh,18px);}
  .send{
    width:clamp(150px,30vw,240px);height:clamp(50px,6.6vh,78px);
    border:1.5px solid var(--line);border-radius:999px;background:var(--white);
    color:rgba(22,20,15,.28);
    display:flex;align-items:center;justify-content:center;
    transition:transform .1s ease, background .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
  }
  .send svg{width:clamp(38px,6vh,56px);height:auto;}
  .send.ready{border-color:var(--gold);color:var(--gold);box-shadow:var(--shadow);}
  .send.ready:hover{background:var(--gold);color:var(--white);}
  .send:active{transform:translateY(2px);}
  .send.ready:active{background:var(--gold);color:var(--white);border-color:var(--gold);}
  .figs{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:clamp(16px,2.4vh,22px);color:var(--ink);}
  .figs svg{height:100%;width:auto;max-width:22px;}
  .person .count{font-family:'Lato',sans-serif;font-weight:900;font-size:clamp(32px,4.8vh,54px);color:var(--ink);line-height:1;}
  .person .cap{font-family:'Lato',sans-serif;font-weight:700;font-size:clamp(10px,1.3vw,13px);letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);white-space:nowrap;}

  /* ---------- confirmation overlay ---------- */
  .confirm{
    position:fixed;inset:0;z-index:40;background:var(--white);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    padding:40px;text-align:center;
    opacity:0;visibility:hidden;transition:opacity .4s ease, visibility .4s;
  }
  .confirm.show{opacity:1;visibility:visible;}
  .confirm h2{margin:0;font-size:clamp(54px,11vw,128px);font-weight:400;color:var(--ink);line-height:.95;}
  .confirm .detail{font-size:clamp(18px,2.6vw,26px);letter-spacing:.16em;text-transform:uppercase;color:var(--gold);}
  .confirm .wish{font-size:clamp(16px,2.2vw,22px);letter-spacing:.3em;text-transform:uppercase;color:var(--ink-soft);}

  /* ---------- dashboard ---------- */
  .dash{flex:1;width:100%;max-width:760px;margin:0 auto;padding:clamp(6px,1.4vw,14px) clamp(20px,4vw,40px) 40px;display:flex;flex-direction:column;}
  .dash-date{text-align:center;font-size:clamp(15px,2vw,20px);letter-spacing:.16em;text-transform:capitalize;color:var(--ink-soft);margin-bottom:clamp(18px,3vw,30px);}
  .total-card{
    border:1.5px solid var(--ink);border-radius:6px;background:var(--white);
    padding:clamp(22px,4vw,44px) 20px;text-align:center;box-shadow:var(--shadow);
  }
  .total-num{font-size:clamp(80px,20vw,180px);line-height:.9;color:var(--ink);}
  .total-cap{font-size:clamp(15px,2vw,20px);letter-spacing:.4em;text-indent:.4em;text-transform:uppercase;color:var(--gold);margin-top:6px;}
  .stat-row{display:flex;justify-content:center;gap:clamp(28px,6vw,64px);margin:clamp(18px,3vw,28px) 0;}
  .stat{text-align:center;}
  .stat b{display:block;font-size:clamp(26px,4vw,40px);color:var(--ink);}
  .stat span{font-size:clamp(11px,1.4vw,13px);letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);}

  .log-title{font-size:clamp(13px,1.6vw,15px);letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:4px;}
  .log{list-style:none;margin:0;padding:0;overflow:auto;flex:1;min-height:80px;}
  .log li{display:flex;align-items:center;justify-content:space-between;padding:13px 4px;border-bottom:1px solid var(--line);font-size:clamp(15px,2vw,18px);}
  .log .room{letter-spacing:.06em;}
  .log .ppl{color:var(--gold);letter-spacing:.08em;}
  .log .time{color:var(--ink-soft);font-size:.8em;letter-spacing:.06em;min-width:54px;text-align:right;}
  .log-empty{padding:30px 4px;text-align:center;color:rgba(22,20,15,.4);font-size:16px;letter-spacing:.04em;}

  .reset{
    margin-top:clamp(18px,3vw,26px);align-self:center;
    border:1px solid var(--gold);border-radius:4px;background:var(--white);
    color:var(--gold);padding:14px 34px;font-size:15px;letter-spacing:.24em;text-transform:uppercase;
    transition:background .2s ease,color .2s ease;
  }
  .reset:hover{background:var(--gold);color:var(--white);}

  /* confirm dialog for reset */
  .ask{position:fixed;inset:0;z-index:50;background:rgba(22,20,15,.45);display:none;align-items:center;justify-content:center;padding:24px;}
  .ask.show{display:flex;}
  .ask-box{background:var(--white);border-radius:8px;max-width:380px;width:100%;padding:30px;text-align:center;box-shadow:var(--shadow);}
  .ask-box p{margin:0 0 22px;font-size:19px;line-height:1.5;color:var(--ink);}
  .ask-box .small{font-size:14px;color:var(--ink-soft);letter-spacing:.02em;}
  .ask-actions{display:flex;gap:12px;justify-content:center;}
  .ask-actions button{padding:12px 24px;border-radius:4px;font-size:14px;letter-spacing:.16em;text-transform:uppercase;}
  .btn-ghost{border:1px solid var(--line);color:var(--ink-soft);}
  .btn-solid{background:var(--ink);color:var(--white);}

  /* ---------- view switch (discreet) ---------- */
  .switch{position:fixed;bottom:14px;right:14px;z-index:30;display:flex;gap:2px;border:1px solid var(--line);border-radius:30px;padding:3px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);}
  .switch button{font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:7px 14px;border-radius:30px;color:var(--ink-soft);}
  .switch button.on{background:var(--ink);color:var(--white);}

  .fs{position:fixed;bottom:14px;left:14px;z-index:30;width:46px;height:46px;border:1px solid var(--line);border-radius:50%;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
  .fs:hover{border-color:var(--line-gold);color:var(--gold);}
  .fs:active{transform:scale(.94);}
  .fs svg{width:21px;height:21px;}
  .fs .ic-compress{display:none;}
  .fs.on .ic-expand{display:none;}
  .fs.on .ic-compress{display:block;}

  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

<script type="module">
  "use strict";

  /* =====================================================================
     FIREBASE — banca dati condivisa in tempo reale
     ⚠️  databaseURL: incolla l'URL ESATTO che vedi in cima alla pagina
         "Realtime Database" della console Firebase. Se il tuo database è
         in Europa l'URL finisce con ".europe-west1.firebasedatabase.app",
         se è negli USA con ".firebaseio.com".
     ===================================================================== */
  const firebaseConfig = {
    apiKey: "AIzaSyBYWgTibQTi1uvvEj2-FLICMfmppYA2cio",
    authDomain: "colazionisas.firebaseapp.com",
    databaseURL: "https://colazionisas-default-rtdb.europe-west1.firebasedatabase.app", // ⬅️ VERIFICA / SOSTITUISCI
    projectId: "colazionisas",
    storageBucket: "colazionisas.firebasestorage.app",
    messagingSenderId: "803123309442",
    appId: "1:803123309442:web:ba44c48e9fa0636afcbd9b"
  };

  // Livello dati: Firebase se disponibile, altrimenti memoria locale (anteprima/offline).
  let Data;
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js");
    const { getDatabase, ref, push, onValue, remove } = await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js");
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    Data = {
      online:true,
      add:(key,e)=>push(ref(db,'entries/'+key), e),
      watch:(key,cb)=>onValue(ref(db,'entries/'+key), function(s){
        const v=s.val()||{};
        const arr=Object.keys(v).map(function(k){return v[k];}).filter(Boolean).sort(function(a,b){return (a.ts||0)-(b.ts||0);});
        cb(arr);
      }),
      clear:(key)=>remove(ref(db,'entries/'+key))
    };
  } catch(err){
    console.warn('Firebase non disponibile — modalità locale (solo questo dispositivo).', err);
    const mem={}, subs={};
    const notify=function(k){(subs[k]||[]).forEach(function(cb){cb((mem[k]||[]).slice());});};
    Data = {
      online:false,
      add:function(key,e){(mem[key]=mem[key]||[]).push(e);notify(key);return Promise.resolve();},
      watch:function(key,cb){(subs[key]=subs[key]||[]).push(cb);cb((mem[key]||[]).slice());return function(){};},
      clear:function(key){mem[key]=[];notify(key);return Promise.resolve();}
    };
  }

  function todayKey(){
    var d=new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  /* ---------- saluto multilingue ---------- */
  var greetings=[
    {t:'Buongiorno',l:'italiano'},
    {t:'Guten Morgen',l:'deutsch'},
    {t:'Good morning',l:'english'},
    {t:'Bonjour',l:'français'},
    {t:'Buenos días',l:'español'},
    {t:'Goedemorgen',l:'nederlands'},
    {t:'Bom dia',l:'português'},
    {t:'Dzień dobry',l:'polski'},
    {t:'Dobré ráno',l:'čeština'},
    {t:'Доброе утро',l:'русский'},
    {t:'早上好',l:'中文'},
    {t:'좋은 아침',l:'한국어'},
    {t:'صباح الخير',l:'العربية'},
    {t:'בוקר טוב',l:'עברית'}
  ];
  var gi=0, gEl=document.getElementById('greet'), glEl=document.getElementById('greetLang');
  setInterval(function(){
    gEl.classList.add('fade-out'); glEl.classList.add('fade-out');
    setTimeout(function(){
      gi=(gi+1)%greetings.length;
      gEl.textContent=greetings[gi].t; glEl.textContent=greetings[gi].l;
      gEl.classList.remove('fade-out'); glEl.classList.remove('fade-out');
    },600);
  },3200);

  /* ---------- figure persone (svg) ---------- */
  function personSVG(){
    return '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="6.4" r="3.6"/><path d="M4.8 20.5c0-3.98 3.22-7.2 7.2-7.2s7.2 3.22 7.2 7.2v.5H4.8z"/></svg>';
  }
  var peopleEl=document.getElementById('people');
  for(var n=1;n<=4;n++){
    var b=document.createElement('button');
    b.className='person'; b.dataset.n=n;
    b.setAttribute('aria-label', n+(n===1?' persona':' persone'));
    var figs='<div class="figs">'; for(var f=0;f<n;f++){ figs+=personSVG(); } figs+='</div>';
    b.innerHTML=figs+'<div class="count">'+n+'</div><div class="cap">'+(n===1?'persona':'persone')+'</div>';
    peopleEl.appendChild(b);
  }

  /* ---------- tastierino ---------- */
  var room='', dispEl=document.getElementById('display');
  function renderDisplay(){
    if(room===''){ dispEl.innerHTML='<span class="placeholder">— — —</span>'; }
    else{ dispEl.textContent=room; }
  }
  document.getElementById('keypad').addEventListener('click',function(e){
    var btn=e.target.closest('.key'); if(!btn) return;
    var k=btn.dataset.k;
    dispEl.classList.remove('error');
    if(k==='clear'){ room=''; }
    else if(k==='back'){ room=room.slice(0,-1); }
    else if(room.length<4){ room+=k; }
    renderDisplay(); updateSend();
  });

  /* ---------- selezione persone + invio ---------- */
  var confirmEl=document.getElementById('confirm'), confirmDetail=document.getElementById('confirmDetail');
  var confirmTimer=null, selectedPeople=null, sendBtn=document.getElementById('sendBtn');

  function updateSend(){
    if(room!=='' && selectedPeople){ sendBtn.classList.add('ready'); }
    else { sendBtn.classList.remove('ready'); }
  }
  function clearSelection(){
    selectedPeople=null;
    Array.prototype.forEach.call(peopleEl.children,function(c){c.classList.remove('selected');});
  }

  peopleEl.addEventListener('click',function(e){
    var btn=e.target.closest('.person'); if(!btn) return;
    selectedPeople=parseInt(btn.dataset.n,10);
    Array.prototype.forEach.call(peopleEl.children,function(c){c.classList.remove('selected');});
    btn.classList.add('selected');
    updateSend();
  });

  sendBtn.addEventListener('click',async function(){
    if(room===''){ dispEl.classList.add('error'); return; }
    if(!selectedPeople){ peopleEl.classList.add('hint'); setTimeout(function(){peopleEl.classList.remove('hint');},500); return; }
    var people=selectedPeople;

    await Data.add(todayKey(), {room:room, people:people, ts:Date.now()});

    confirmDetail.textContent='Stanza '+room+' · '+people+(people===1?' persona':' persone');
    confirmEl.classList.add('show');

    room=''; clearSelection(); renderDisplay(); updateSend();
    clearTimeout(confirmTimer);
    confirmTimer=setTimeout(function(){ confirmEl.classList.remove('show'); },3200);
  });
  confirmEl.addEventListener('click',function(){ confirmEl.classList.remove('show'); clearTimeout(confirmTimer); });

  /* ---------- dashboard ---------- */
  var totalNum=document.getElementById('totalNum'),
      statRooms=document.getElementById('statRooms'),
      statEntries=document.getElementById('statEntries'),
      logEl=document.getElementById('log'),
      dashDate=document.getElementById('dashDate');

  function fmtTime(ts){ var d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

  function renderDash(arr){
    arr = arr || [];
    var d=new Date();
    dashDate.textContent=d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    var total=arr.reduce(function(s,e){return s+e.people;},0);
    var rooms={}; arr.forEach(function(e){rooms[e.room]=true;});
    totalNum.textContent=total;
    statRooms.textContent=Object.keys(rooms).length;
    statEntries.textContent=arr.length;
    if(arr.length===0){
      logEl.innerHTML='<li class="log-empty">Ancora nessun ingresso oggi</li>';
    } else {
      var rows=arr.slice().reverse().map(function(e){
        return '<li><span class="room">Stanza '+e.room+'</span>'+
               '<span class="ppl">'+e.people+(e.people===1?' persona':' persone')+'</span>'+
               '<span class="time">'+fmtTime(e.ts)+'</span></li>';
      }).join('');
      logEl.innerHTML=rows;
    }
  }

  /* ---------- azzeramento ---------- */
  var ask=document.getElementById('ask');
  document.getElementById('resetBtn').addEventListener('click',function(){ ask.classList.add('show'); });
  document.getElementById('askNo').addEventListener('click',function(){ ask.classList.remove('show'); });
  document.getElementById('askYes').addEventListener('click',async function(){
    await Data.clear(todayKey()); ask.classList.remove('show');
  });

  /* ---------- switch viste ---------- */
  var kioskView=document.getElementById('kiosk'), dashView=document.getElementById('dashboard');
  var swK=document.getElementById('swKiosk'), swD=document.getElementById('swDash');
  var unwatch=null;
  function show(view){
    if(view==='dash'){
      kioskView.classList.remove('is-active'); dashView.classList.add('is-active');
      swD.classList.add('on'); swK.classList.remove('on');
      renderDash([]);
      if(unwatch) unwatch();
      unwatch=Data.watch(todayKey(), function(arr){ renderDash(arr); });
    } else {
      dashView.classList.remove('is-active'); kioskView.classList.add('is-active');
      swK.classList.add('on'); swD.classList.remove('on');
      if(unwatch){ unwatch(); unwatch=null; }
    }
  }
  swK.addEventListener('click',function(){ show('kiosk'); location.hash=''; });
  swD.addEventListener('click',function(){ show('dash'); location.hash='sala'; });
  // Apri direttamente la vista sala con URL che termina in #sala
  if(/sala|dash/i.test(location.hash)) show('dash');

  /* ---------- schermo intero ---------- */
  var fsBtn=document.getElementById('fsBtn');
  function isFs(){ return document.fullscreenElement||document.webkitFullscreenElement||null; }
  fsBtn.addEventListener('click',function(){
    try{
      if(isFs()){
        (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
      } else {
        var el=document.documentElement;
        (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
      }
    }catch(e){}
  });
  function syncFs(){ fsBtn.classList.toggle('on', !!isFs()); }
  document.addEventListener('fullscreenchange',syncFs);
  document.addEventListener('webkitfullscreenchange',syncFs);

  renderDisplay();
</script>
</body>
</html>
